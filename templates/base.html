<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}相性占い分析ツール{% endblock %} | 相性プリズム</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            "borderRadius": {
              "DEFAULT": "0.25rem",
              "lg": "0.5rem",
              "xl": "0.75rem",
              "full": "9999px"
            },
            "fontFamily": {
              "headline": ["Manrope", "Noto Sans JP"],
              "body": ["Plus Jakarta Sans", "Noto Sans JP"],
              "label": ["Plus Jakarta Sans", "Noto Sans JP"]
            }
          },
        },
      }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Mystical Premium Base Theme */
        html, body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
            background: linear-gradient(170deg, #0a0a1a 0%, #010733 40%, #0d0d2b 70%, #0a0a1a 100%) !important;
            color: #e8e8f0 !important;
            min-height: 100vh;
        }
        /* Utility Classes */
        .gold { color: #D4AF37; }
        .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #f5e6a3 50%, #D4AF37 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gold-btn { background: linear-gradient(135deg, #D4AF37 0%, #b8941f 100%); color: #0a0a1a; }
        .gold-border { border: 1px solid rgba(212,175,55,0.25); }
        .gold-border-hover:hover { border-color: rgba(212,175,55,0.6); box-shadow: 0 0 20px rgba(212,175,55,0.1); }
        .mystic-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(212,175,55,0.15);
            backdrop-filter: blur(8px);
        }
        .mystic-card-hover:hover {
            background: rgba(255,255,255,0.07);
            border-color: rgba(212,175,55,0.4);
            box-shadow: 0 0 30px rgba(212,175,55,0.08);
        }
        .cosmic-bg {
            background:
                radial-gradient(1px 1px at 10% 20%, rgba(212,175,55,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 30% 60%, rgba(189,194,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 50% 10%, rgba(212,175,55,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 80%, rgba(189,194,255,0.2) 0%, transparent 100%),
                radial-gradient(1px 1px at 90% 40%, rgba(212,175,55,0.35) 0%, transparent 100%),
                radial-gradient(2px 2px at 15% 85%, rgba(212,175,55,0.2) 0%, transparent 100%),
                radial-gradient(1px 1px at 85% 15%, rgba(189,194,255,0.25) 0%, transparent 100%);
        }
        .mystic-input {
            background: rgba(255,255,255,0.06) !important;
            border: 1px solid rgba(212,175,55,0.15) !important;
            color: #e8e8f0 !important;
        }
        .mystic-input:focus {
            border-color: rgba(212,175,55,0.5) !important;
            box-shadow: 0 0 0 2px rgba(212,175,55,0.15) !important;
            outline: none !important;
        }
        .mystic-input::placeholder { color: rgba(232,232,240,0.3) !important; }
        .mystic-select {
            background: rgba(255,255,255,0.06) !important;
            border: 1px solid rgba(212,175,55,0.15) !important;
            color: #e8e8f0 !important;
        }
        .mystic-select:focus {
            border-color: rgba(212,175,55,0.5) !important;
            box-shadow: 0 0 0 2px rgba(212,175,55,0.15) !important;
            outline: none !important;
        }
        .editorial-shadow { box-shadow: 0px 12px 32px rgba(0, 0, 0, 0.3); }
        .ghost-border { border: 1px solid rgba(212,175,55,0.12); }
    </style>
    <style media="print">
        @media print {
            header, footer, .fixed, .no-print { display: none !important; }
            body { background: white !important; color: black !important; font-size: 12px; }
            .editorial-shadow { box-shadow: none; }
            .mystic-card { background: white; border: 1px solid #ccc; }
            details { break-inside: avoid; }
            details[open] > div { display: block; }
            canvas { max-width: 300px; max-height: 300px; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen flex flex-col">
    <!-- TopAppBar -->
    <header class="fixed top-0 w-full z-50" style="background: rgba(10,10,26,0.9); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(212,175,55,0.1);">
        <div class="flex justify-between items-center px-6 py-4 w-full">
            <a href="/" class="flex items-center gap-3 text-2xl font-light text-white tracking-widest font-headline">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="相性プリズム" class="h-10 w-10 rounded-lg">
                <span class="gold-gradient">相性プリズム</span>
            </a>
            <nav class="hidden md:flex gap-8 items-center">
                <a class="gold font-bold hover:opacity-80 transition-opacity text-sm tracking-wider" href="/">Readings</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow pt-20">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="w-full py-8 px-8 mt-auto" style="background: rgba(10,10,26,0.8); border-top: 1px solid rgba(212,175,55,0.1);">
        <div class="flex flex-col md:flex-row justify-between items-center max-w-7xl mx-auto gap-4">
            <div class="flex items-center gap-2 text-lg font-bold font-headline gold">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="" class="h-6 w-6 rounded">
                相性プリズム
            </div>
        </div>
    </footer>

    <!-- Decorative Bottom Gradient -->
    <div class="fixed bottom-0 left-0 w-full h-1 z-50 md:block hidden" style="background: linear-gradient(90deg, #D4AF37, #010766, #D4AF37);"></div>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
